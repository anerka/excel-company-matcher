# Publishes the static site to GitHub Pages when you push to `main`.
#
# One-time setup (repo owner):
#   Settings → Pages → Build and deployment → Source: GitHub Actions
#
# Site URL: https://<owner>.github.io/excel-company-matcher/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          # Creates/enables the Pages site on first run if repo Settings → Pages is unset.
          enablement: true

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html app.js INSTRUKTIONER.txt _site/
          cp -r vendor _site/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
